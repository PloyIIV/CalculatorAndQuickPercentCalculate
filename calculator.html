<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kawaii Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffe9f4 0%, #fce4ec 50%, #f3e5f5 100%);
      font-family: 'Nunito', sans-serif;
      padding: 20px;
    }

    .calculator {
      width: 100%;
      max-width: 380px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      border-radius: 40px;
      padding: 30px 25px 35px;
      box-shadow:
        0 20px 60px rgba(233, 30, 99, 0.15),
        0 0 0 2px rgba(255, 255, 255, 0.6) inset,
        0 0 30px rgba(255, 182, 193, 0.3);
      transition: transform 0.3s ease;
    }

    .calculator:hover {
      transform: translateY(-4px);
    }

    /* Decorative face */
    .face {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 12px;
    }

    .face .eye {
      width: 10px;
      height: 14px;
      background: #e91e63;
      border-radius: 50%;
      animation: blink 3.5s infinite;
    }

    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }

    .face .mouth {
      width: 20px;
      height: 10px;
      border-bottom: 3px solid #e91e63;
      border-radius: 0 0 20px 20px;
      margin-top: -2px;
    }

    /* Display */
    .display {
      background: rgba(255, 255, 255, 0.6);
      border-radius: 24px;
      padding: 20px 24px;
      margin-bottom: 20px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(233, 30, 99, 0.08) inset;
    }

    .display .expression {
      font-size: 18px;
      color: #9e9e9e;
      min-height: 26px;
      word-break: break-all;
      text-align: right;
      width: 100%;
    }

    .display .result {
      font-size: 42px;
      font-weight: 800;
      color: #4a148c;
      word-break: break-all;
      text-align: right;
      width: 100%;
      line-height: 1.2;
      transition: font-size 0.15s ease;
    }

    .display .result.small {
      font-size: 28px;
    }

    /* Buttons grid */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .btn {
      padding: 18px 8px;
      font-size: 24px;
      font-weight: 700;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      transition: all 0.12s ease;
      position: relative;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active {
      transform: scale(0.92);
    }

    /* Number buttons */
    .btn.number {
      background: #fce4ec;
      color: #6a1b9a;
      box-shadow: 0 4px 0 #f8bbd0;
    }

    .btn.number:hover {
      background: #f8bbd0;
    }

    .btn.number:active {
      box-shadow: 0 1px 0 #f8bbd0;
    }

    /* Operator buttons */
    .btn.operator {
      background: #e1bee7;
      color: #4a148c;
      box-shadow: 0 4px 0 #ce93d8;
    }

    .btn.operator:hover {
      background: #ce93d8;
    }

    .btn.operator:active {
      box-shadow: 0 1px 0 #ce93d8;
    }

    /* Special buttons */
    .btn.special {
      background: #f3e5f5;
      color: #7b1fa2;
      box-shadow: 0 4px 0 #e1bee7;
    }

    .btn.special:hover {
      background: #e1bee7;
    }

    .btn.special:active {
      box-shadow: 0 1px 0 #e1bee7;
    }

    /* Equals button - spans 2 cols */
    .btn.equals {
      grid-column: span 2;
      background: linear-gradient(135deg, #e91e63, #ab47bc);
      color: #fff;
      box-shadow: 0 4px 0 #8e24aa;
      font-size: 28px;
    }

    .btn.equals:hover {
      background: linear-gradient(135deg, #d81b60, #9c27b0);
    }

    .btn.equals:active {
      box-shadow: 0 1px 0 #8e24aa;
    }

    /* Ripple effect (kawaii sparkle) */
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255,255,255,0.5) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .btn:hover::after {
      opacity: 1;
    }

    /* Responsive */
    @media (max-width: 420px) {
      body { padding: 10px; }
      .calculator {
        padding: 20px 16px 25px;
        border-radius: 30px;
      }
      .btn { padding: 15px 6px; font-size: 20px; border-radius: 16px; }
      .display .result { font-size: 34px; }
      .display .result.small { font-size: 22px; }
      .buttons { gap: 10px; }
      .display { padding: 14px 18px; min-height: 80px; }
    }

    @media (max-width: 360px) {
      .btn { padding: 12px 4px; font-size: 18px; }
      .display .result { font-size: 28px; }
      .display .result.small { font-size: 20px; }
      .buttons { gap: 8px; }
    }
  </style>
</head>
<body>

<div class="calculator" role="application" aria-label="Kawaii Calculator">
  <!-- Cute face -->
  <div class="face" aria-hidden="true">
    <div class="eye"></div>
    <div class="mouth"></div>
    <div class="eye"></div>
  </div>

  <!-- Display -->
  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="result" id="result">0</div>
  </div>

  <!-- Buttons -->
  <div class="buttons">
    <button class="btn special" data-action="clear">AC</button>
    <button class="btn special" data-action="negate">+/-</button>
    <button class="btn special" data-action="percent">%</button>
    <button class="btn operator" data-action="divide">÷</button>

    <button class="btn number" data-value="7">7</button>
    <button class="btn number" data-value="8">8</button>
    <button class="btn number" data-value="9">9</button>
    <button class="btn operator" data-action="multiply">x</button>

    <button class="btn number" data-value="4">4</button>
    <button class="btn number" data-value="5">5</button>
    <button class="btn number" data-value="6">6</button>
    <button class="btn operator" data-action="subtract">-</button>

    <button class="btn number" data-value="1">1</button>
    <button class="btn number" data-value="2">2</button>
    <button class="btn number" data-value="3">3</button>
    <button class="btn operator" data-action="add">+</button>

    <button class="btn number" data-value="0">0</button>
    <button class="btn number" data-value=".">.</button>
    <button class="btn equals" data-action="calculate">=</button>
  </div>
</div>

<script>
  const resultEl = document.getElementById('result');
  const expressionEl = document.getElementById('expression');
  const buttons = document.querySelectorAll('.btn');

  let currentInput = '0';
  let previousInput = '';
  let operator = null;
  let shouldResetInput = false;

  function formatDisplay(value) {
    const str = String(value);
    if (str.length > 14) {
      resultEl.classList.add('small');
    } else {
      resultEl.classList.remove('small');
    }
    return str;
  }

  function updateDisplay() {
    resultEl.textContent = formatDisplay(currentInput);
  }

  function updateExpression() {
    if (operator && previousInput) {
      const opMap = { add: '+', subtract: '-', multiply: 'x', divide: '÷' };
      expressionEl.textContent = `${previousInput} ${opMap[operator]}`;
    } else {
      expressionEl.textContent = '';
    }
  }

  function inputNumber(value) {
    if (shouldResetInput) {
      currentInput = '';
      shouldResetInput = false;
    }
    if (value === '.' && currentInput.includes('.')) return;
    if (currentInput === '0' && value !== '.') {
      currentInput = value;
    } else {
      currentInput += value;
    }
    updateDisplay();
    updateExpression();
  }

  function inputOperator(op) {
    if (operator && !shouldResetInput) {
      calculate();
    }
    previousInput = currentInput;
    operator = op;
    shouldResetInput = true;
    updateExpression();
  }

  function calculate() {
    if (!operator || !previousInput) return;

    const prev = parseFloat(previousInput);
    const curr = parseFloat(currentInput);
    if (isNaN(prev) || isNaN(curr)) return;

    let result;
    switch (operator) {
      case 'add': result = prev + curr; break;
      case 'subtract': result = prev - curr; break;
      case 'multiply': result = prev * curr; break;
      case 'divide':
        if (curr === 0) {
          resultEl.textContent = 'oh nyo! 💔';
          reset();
          return;
        }
        result = prev / curr;
        break;
      default: return;
    }

    if (!isFinite(result)) {
      resultEl.textContent = 'oh nyo! 💔';
      reset();
      return;
    }

    currentInput = String(parseFloat(result.toFixed(10)));
    operator = null;
    previousInput = '';
    shouldResetInput = true;
    expressionEl.textContent = '';
    updateDisplay();
  }

  function reset() {
    currentInput = '0';
    previousInput = '';
    operator = null;
    shouldResetInput = false;
    expressionEl.textContent = '';
    updateDisplay();
  }

  function negate() {
    if (currentInput !== '0') {
      currentInput = currentInput.startsWith('-') ? currentInput.slice(1) : '-' + currentInput;
      updateDisplay();
    }
  }

  function percent() {
    const num = parseFloat(currentInput);
    if (!isNaN(num)) {
      currentInput = String(num / 100);
      updateDisplay();
    }
  }

  function handleButtonClick(e) {
    const btn = e.currentTarget;
    const value = btn.dataset.value;
    const action = btn.dataset.action;

    // Sparkle effect
    const rect = btn.getBoundingClientRect();
    const x = ((e.clientX || e.touches?.[0]?.clientX || rect.left + rect.width / 2) - rect.left) / rect.width * 100;
    const y = ((e.clientY || e.touches?.[0]?.clientY || rect.top + rect.height / 2) - rect.top) / rect.height * 100;
    btn.style.setProperty('--x', x + '%');
    btn.style.setProperty('--y', y + '%');

    if (value) {
      inputNumber(value);
    } else if (action === 'clear') {
      reset();
    } else if (action === 'negate') {
      negate();
    } else if (action === 'percent') {
      percent();
    } else if (action === 'calculate') {
      calculate();
    } else if (action) {
      inputOperator(action);
    }
  }

  // Keyboard support
  document.addEventListener('keydown', (e) => {
    const key = e.key;
    if (key >= '0' && key <= '9') inputNumber(key);
    else if (key === '.') inputNumber('.');
    else if (key === '+') inputOperator('add');
    else if (key === '-') inputOperator('subtract');
    else if (key === '*') inputOperator('multiply');
    else if (key === '/') { e.preventDefault(); inputOperator('divide'); }
    else if (key === 'Enter' || key === '=') calculate();
    else if (key === 'Backspace') {
      if (currentInput.length > 1) {
        currentInput = currentInput.slice(0, -1);
      } else {
        currentInput = '0';
      }
      updateDisplay();
    }
    else if (key === 'Escape') reset();
  });

  buttons.forEach(btn => {
    btn.addEventListener('click', handleButtonClick);
    btn.addEventListener('touchstart', (e) => {
      const rect = btn.getBoundingClientRect();
      const touch = e.touches[0];
      const x = ((touch.clientX - rect.left) / rect.width) * 100;
      const y = ((touch.clientY - rect.top) / rect.height) * 100;
      btn.style.setProperty('--x', x + '%');
      btn.style.setProperty('--y', y + '%');
    }, { passive: true });
  });

  updateDisplay();
</script>
</body>
</html>
